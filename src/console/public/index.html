<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>ARIKE Console</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  :root {
    --bg: #0b0b0d;
    --surface: #151518;
    --border: #26262b;
    --text: #f2f2f0;
    --muted: #8a8a92;
    --accent: #6ee7b7;
    --accent-dim: #1c3a30;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
    padding: 40px 24px;
  }
  .wrap { max-width: 880px; margin: 0 auto; }
  header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 8px;
    flex-wrap: wrap;
    gap: 8px;
  }
  h1 {
    font-size: 28px;
    letter-spacing: -0.02em;
    margin: 0;
  }
  h1 span { color: var(--accent); }
  .status {
    font-size: 13px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 0 0 rgba(110,231,183,0.6);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(110,231,183,0.5); }
    70% { box-shadow: 0 0 0 8px rgba(110,231,183,0); }
    100% { box-shadow: 0 0 0 0 rgba(110,231,183,0); }
  }
  .subtitle { color: var(--muted); margin: 0 0 32px 0; font-size: 15px; }

  .stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 32px;
  }
  .stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 18px;
  }
  .stat .label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; }
  .stat .value { font-size: 24px; margin-top: 6px; font-variant-numeric: tabular-nums; }

  .feed { border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  .row {
    display: grid;
    grid-template-columns: 1fr 1fr 90px 90px;
    gap: 12px;
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    align-items: center;
  }
  .row:last-child { border-bottom: none; }
  .row.head {
    background: var(--surface);
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    font-size: 11px;
  }
  .addr { font-family: "SF Mono", Consolas, monospace; color: var(--text); }
  .amount { color: var(--accent); text-align: right; font-variant-numeric: tabular-nums; }
  .time { color: var(--muted); text-align: right; }
  .row.new { animation: flash 1.2s ease-out; }
  @keyframes flash {
    0% { background: var(--accent-dim); }
    100% { background: transparent; }
  }
  .empty { padding: 40px; text-align: center; color: var(--muted); }
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>ARIKE<span>.</span> Console</h1>
      <div class="status"><span class="dot"></span><span id="statusText">connecting…</span></div>
    </header>
    <p class="subtitle">Live feed of agent-to-agent payments on Arc — no human approves any of these.</p>

    <div class="stats">
      <div class="stat"><div class="label">Total settlements</div><div class="value" id="statCount">–</div></div>
      <div class="stat"><div class="label">Total USDC moved</div><div class="value" id="statTotal">–</div></div>
      <div class="stat"><div class="label">Unique providers paid</div><div class="value" id="statProviders">–</div></div>
    </div>

    <div class="feed" id="feed">
      <div class="row head">
        <div>Consumer</div>
        <div>Provider</div>
        <div style="text-align:right">Amount</div>
        <div style="text-align:right">When</div>
      </div>
    </div>
  </div>

  <script>
    let knownCount = 0;

    function shorten(addr) {
      if (!addr) return "—";
      if (addr.length <= 14) return addr;
      return addr.slice(0, 8) + "…" + addr.slice(-4);
    }

    function timeAgo(iso) {
      const diff = Math.max(0, Date.now() - new Date(iso).getTime());
      const s = Math.floor(diff / 1000);
      if (s < 60) return s + "s ago";
      const m = Math.floor(s / 60);
      if (m < 60) return m + "m ago";
      return Math.floor(m / 60) + "h ago";
    }

    async function refresh() {
      try {
        const res = await fetch("/api/settlements");
        const data = await res.json();
        document.getElementById("statusText").textContent = data.live ? "live · reading Arc Testnet" : "demo mode · mock data";

        const feed = document.getElementById("feed");
        feed.querySelectorAll(".row:not(.head)").forEach((r) => r.remove());

        if (!data.settlements.length) {
          const empty = document.createElement("div");
          empty.className = "empty";
          empty.textContent = "No settlements yet — run the consumer agent to see the feed populate.";
          feed.appendChild(empty);
        }

        let total = 0;
        const providers = new Set();

        data.settlements.forEach((s, i) => {
          total += parseFloat(s.amountUsdc);
          providers.add(s.provider);

          const row = document.createElement("div");
          row.className = "row" + (i === 0 && data.settlements.length > knownCount ? " new" : "");
          row.innerHTML = `
            <div class="addr">${shorten(s.consumer)}</div>
            <div class="addr">${shorten(s.provider)}</div>
            <div class="amount">${parseFloat(s.amountUsdc).toFixed(4)}</div>
            <div class="time">${timeAgo(s.timestamp)}</div>
          `;
          feed.appendChild(row);
        });

        document.getElementById("statCount").textContent = data.settlements.length;
        document.getElementById("statTotal").textContent = total.toFixed(4);
        document.getElementById("statProviders").textContent = providers.size;
        knownCount = data.settlements.length;
      } catch (err) {
        document.getElementById("statusText").textContent = "connection error";
        console.error(err);
      }
    }

    refresh();
    setInterval(refresh, 4000);
  </script>
</body>
</html>
